name: app-registrar
base: core24
version: '1.0.2'
title: App Registrar
summary: Register any executable as a desktop application
license: GPL-3.0
contact: https://github.com/theUpsider/app-registrar/issues
issues: https://github.com/theUpsider/app-registrar/issues
source-code: https://github.com/theUpsider/app-registrar
website: https://github.com/theUpsider/app-registrar
description: |
  App Registrar lets you turn any executable or script into a proper
  desktop application — complete with name, icon, categories, and
  keywords — without root access.

  Browse, add, edit, and delete your registered app launchers from a
  clean GNOME-native interface built with GTK 4 and libadwaita.

  Note: The Nautilus "Register as App" right-click menu requires a
  separate manual install step because Snap sandboxing prevents
  automatic extension deployment. See the project README for details:
  https://github.com/theUpsider/app-registrar

grade: stable
confinement: strict

icon: data/icons/hicolor/scalable/apps/io.github.theUpsider.AppRegistrar.svg
donation:
  - https://buymeacoffee.com/theupsider
apps:
  app-registrar:
    command: bin/app-registrar
    common-id: io.github.theUpsider.AppRegistrar
    extensions: [gnome]
    plugs:
      - home
      - apps-dir
      - config-dir
      - nautilus-ext-dir
    slots:
      - dbus-app-registrar

slots:
  dbus-app-registrar:
    interface: dbus
    bus: session
    name: io.github.theUpsider.AppRegistrar

plugs:
  apps-dir:
    interface: personal-files
    write:
      - $HOME/.local/share/applications
  config-dir:
    interface: personal-files
    write:
      - $HOME/.config/nautilus-app-registrar
  nautilus-ext-dir:
    interface: personal-files
    write:
      - $HOME/.local/share/nautilus-python

parts:
  app-registrar:
    plugin: nil
    source: .
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/lib/app-registrar
      cp -r app_registrar $CRAFT_PART_INSTALL/lib/app-registrar/
      cp nautilus_extension.py $CRAFT_PART_INSTALL/lib/app-registrar/
      mkdir -p $CRAFT_PART_INSTALL/bin
      cp snap/local/launcher.sh $CRAFT_PART_INSTALL/bin/app-registrar
      chmod +x $CRAFT_PART_INSTALL/bin/app-registrar
    stage-packages:
      - python3-gi
      - python3-gi-cairo
      - desktop-file-utils

  icons:
    plugin: dump
    source: data/icons
    organize:
      'hicolor/': 'usr/share/icons/hicolor/'
