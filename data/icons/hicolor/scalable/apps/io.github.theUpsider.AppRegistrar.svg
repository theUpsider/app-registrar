<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">

  <!-- Base -->
  <rect x="8" y="12" width="112" height="96" rx="20" fill="#3584e4"></rect>

  <!-- Top highlight -->
  <rect x="8" y="12" width="112" height="48" rx="20" fill="#ffffff" opacity="0.08"></rect>

  <!-- Bottom shade (profile depth) -->
  <rect x="8" y="64" width="112" height="44" rx="20" fill="#1c71d8" opacity="0.45"></rect>

  <!-- Inner surface (slightly inset panel) -->
  <rect x="20" y="24" width="88" height="56" rx="12" fill="#4c97ff"></rect>

  <!-- Inner shadow -->
  <rect x="20" y="52" width="88" height="28" rx="12" fill="#1c71d8" opacity="0.25"></rect>

  <!-- App grid -->
  <g fill="#ffffff" opacity="0.95">
    <rect x="40" y="36" width="10" height="10" rx="2"></rect>
    <rect x="54" y="36" width="10" height="10" rx="2"></rect>
    <rect x="68" y="36" width="10" height="10" rx="2"></rect>
    <rect x="40" y="50" width="10" height="10" rx="2"></rect>
    <rect x="54" y="50" width="10" height="10" rx="2"></rect>
    <rect x="68" y="50" width="10" height="10" rx="2"></rect>
  </g>

  <!-- Add badge (raised) -->
  <circle cx="94" cy="92" r="18" fill="#ff7800"></circle>
  
  <!-- Badge highlight -->
  <circle cx="94" cy="86" r="12" fill="#ffffff" opacity="0.15"></circle>

  <!-- Badge shadow -->
  <ellipse cx="94" cy="100" rx="14" ry="6" fill="#000000" opacity="0.15"></ellipse>

  <!-- Plus -->
  <rect x="92" y="82" width="4" height="20" fill="#ffffff"></rect>
  <rect x="84" y="90" width="20" height="4" fill="#ffffff"></rect>

</svg>